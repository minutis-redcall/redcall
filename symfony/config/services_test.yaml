services:
  App\Captcha\CaptchaVerifierInterface:
    alias: 'App\Captcha\CheckboxCaptchaVerifier'

  App\Provider\Email\EmailProvider:
    class: 'Bundles\SandboxBundle\Provider\FakeEmailProvider'
    arguments: [ '@doctrine' ]
    public: true

  App\Provider\Minutis\MinutisProvider:
    class: 'Bundles\SandboxBundle\Provider\FakeMinutisProvider'
    arguments:
      - '@Bundles\SandboxBundle\Manager\FakeOperationManager'
      - '@Bundles\SandboxBundle\Manager\FakeOperationResourceManager'
      - '@App\Manager\VolunteerManager'
    public: true

  # Replace the real Google Cloud TaskSender with a null implementation that
  # only records dispatches. Without this, /admin/maintenance/pegass-files
  # and /admin/maintenance/annuaire-national execute their tasks inline
  # (TaskSender::fire short-circuits in any non-prod env), which then hits
  # Google APIs without service-account credentials and crashes.
  Bundles\GoogleTaskBundle\Service\TaskSender:
    class: 'Bundles\SandboxBundle\Service\NullTaskSender'
    arguments:
      - '@router'
      - '@kernel'
      - '@Bundles\GoogleTaskBundle\Bag\TaskBag'
    public: true

  Bundles\SandboxBundle\Security\Csrf\TestCsrfTokenManager:
    public: true

  security.csrf.token_manager:
    alias: 'Bundles\SandboxBundle\Security\Csrf\TestCsrfTokenManager'
    public: true

  Symfony\Component\Security\Csrf\CsrfTokenManagerInterface:
    alias: 'Bundles\SandboxBundle\Security\Csrf\TestCsrfTokenManager'
    public: true

  # Sync pipeline points at the committed CSV fixtures instead of GCS in tests
  App\Sync\Source\LocalCsvSource:
    arguments:
      $rootDir: '%kernel.project_dir%/tests/Fixtures/sync'
  App\Sync\Source\CsvSourceInterface:
    alias: 'App\Sync\Source\LocalCsvSource'
    public: true
